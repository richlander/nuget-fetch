name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for NuGet trusted publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Pack
        run: dotnet pack src/NuGetFetch/NuGetFetch.csproj -c Release -o ${{ github.workspace }}/artifacts
      - name: NuGet trusted publishing login
        uses: NuGet/login@v1
        id: login
        with:
          user: richlander
      - name: Push
        run: >
          dotnet nuget push "${{ github.workspace }}/artifacts/*.nupkg"
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json --skip-duplicate
